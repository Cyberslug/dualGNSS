sentence=CASIC and u-blox M6-M10 GNSS library for ESP32 with auto-baud detection and CRSF payload output.
paragraph=Provides complete module configuration and binary protocol parsing through two independent classes — UbxGNSS and CasicGNSS. A project using only one protocol never links object code from the other. Supports u-blox M6 through M10 and CASIC binary NAV-PV output. Outputs CrsfGpsPayload structs ready for CRSF frame serialisation.
